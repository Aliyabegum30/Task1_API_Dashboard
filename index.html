<!DOCTYPE html>
<html>
<head>
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h1>🌤 Weather Dashboard</h1>
<p>Discover the Forecast for any city in the World!</p>
</div>

<div class="search-box">
<input type="text" id="city" placeholder="Search for a City..." onkeypress="if(event.key==='Enter'){getWeather()}">
<span class="search-icon" onclick="getWeather()">🔍</span>
<div id="suggestions"></div>
</div>
<div class="quick-cities">

<span onclick="quickCity('New York')">New York</span>
<span onclick="quickCity('London')">London</span>
<span onclick="quickCity('Tokyo')">Tokyo</span>
<span onclick="quickCity('Paris')">Paris</span>
<span onclick="quickCity('Dubai')">Dubai</span>

</div>
<div class="hero-center">

<div class="floating-globe" id="globe">
<img src="earth.jpeg">
</div>

<p class="hero-text">Search for a city to see the weather</p>

</div>

<div id="weather"></div>

<!-- HOURLY FORECAST -->
<div id="hourly-container">
<h2>Hourly Forecast</h2>
<div class="hourly-slider" id="hourlySlider"></div>
</div>

<!-- 5 DAY FORECAST -->
<div id="forecast-container">

<div class="forecast-title">
5 DAY FORECAST
</div>

<div class="forecast-container" id="forecastCards"></div>

</div>
<div id="extraData"></div>
<script src="script.js"></script>

</body>
</html>
